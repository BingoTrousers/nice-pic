<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Camera body -->
  <rect x="2" y="9" width="28" height="18" rx="3" fill="#1e293b"/>
  <!-- Viewfinder bump -->
  <rect x="11" y="6" width="10" height="5" rx="2" fill="#1e293b"/>
  <!-- Lens outer ring -->
  <circle cx="16" cy="18" r="7" fill="#334155"/>
  <!-- Lens inner -->
  <circle cx="16" cy="18" r="5" fill="#0f172a"/>
  <!-- Lens highlight -->
  <circle cx="16" cy="18" r="3" fill="#3b82f6" opacity="0.7"/>
  <circle cx="14.5" cy="16.5" r="1" fill="white" opacity="0.5"/>
  <!-- Flash indicator -->
  <circle cx="25" cy="13" r="1.5" fill="#fbbf24"/>
</svg>
